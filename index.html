<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TILT</title>
    <style>
        :root {
            --felt:      #1a4a2e;
            --felt-dk:   #0c2718;
            --wood:      #1a0c04;
            --gold:      #c9a84c;
            --gold-d:    rgba(201,168,76,0.3);
            --ivory:     #fffef0;
            --ivory-d:   #e8e2cc;
            --ink:       #1a0f05;
            --red:       #8b1a2e;
            --red-b:     #c0213e;
            --green:     #3a9e5a;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(ellipse at 50% 40%, var(--felt) 0%, var(--felt-dk) 100%);
            color: var(--ivory);
            width:100vw; height:100vh;
            overflow:hidden; user-select:none;
        }
        /* subtle felt weave */
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background:
                repeating-linear-gradient( 55deg, transparent 0,transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px),
                repeating-linear-gradient(-55deg, transparent 0,transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
        }

        /* ====== SCREENS ====== */
        .screen { display:none; width:100%; height:100%; position:relative; z-index:1; }
        .screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #screen-game.active { display:block; }

        /* ====== BUTTONS ====== */
        .btn {
            padding:12px 28px; border:none; border-radius:5px;
            font-size:.95rem; font-weight:700; cursor:pointer;
            letter-spacing:.07em; text-transform:uppercase;
            transition:transform .1s, box-shadow .1s;
        }
        .btn:hover  { transform:translateY(-2px); }
        .btn:active { transform:translateY(2px); box-shadow:none !important; }
        .btn:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

        .btn-primary {
            background:linear-gradient(to bottom, var(--red-b), var(--red));
            color:var(--ivory);
            border:1px solid #5a0d1c;
            box-shadow:0 5px 0 #4a0915, 0 7px 14px rgba(0,0,0,.45);
        }
        .btn-primary:hover  { box-shadow:0 6px 0 #4a0915, 0 9px 18px rgba(0,0,0,.45); }
        .btn-primary:active { box-shadow:0 2px 0 #4a0915; }

        .btn-secondary {
            background:linear-gradient(to bottom, #e8e2cc, #d0cab4);
            color:var(--ink);
            border:1px solid #a89e80;
            box-shadow:0 5px 0 #7a7050, 0 7px 14px rgba(0,0,0,.3);
        }
        .btn-secondary:hover  { box-shadow:0 6px 0 #7a7050, 0 9px 18px rgba(0,0,0,.3); }
        .btn-secondary:active { box-shadow:0 2px 0 #7a7050; }

        .btn-ghost {
            background:transparent; color:rgba(201,168,76,.55); font-size:.82rem;
            padding:8px 16px; border:1px solid transparent; text-transform:none;
            letter-spacing:.02em; box-shadow:none;
        }
        .btn-ghost:hover { color:var(--gold); border-color:var(--gold-d); transform:none; }
        .btn-danger { background:rgba(139,26,46,.2); color:#e94560; border:1px solid rgba(139,26,46,.4); box-shadow:none; text-transform:none; letter-spacing:.02em; }

        /* ====== FORM ====== */
        .input-field {
            padding:11px 15px; border-radius:5px;
            border:1px solid var(--gold-d);
            background:rgba(10,5,2,.5); color:var(--ivory); font-size:.97rem;
            outline:none; transition:border-color .2s;
        }
        .input-field:focus { border-color:var(--gold); }
        .input-field::placeholder { color:rgba(201,168,76,.2); }

        .form-box {
            background:linear-gradient(160deg, rgba(28,12,3,.92), rgba(18,7,1,.96));
            border:1px solid rgba(201,168,76,.28);
            border-radius:10px; padding:36px 40px;
            width:370px; display:flex; flex-direction:column; gap:14px;
            box-shadow:0 24px 64px rgba(0,0,0,.65), inset 0 1px 0 rgba(201,168,76,.12);
        }
        .form-box h2 {
            text-align:center; color:var(--gold);
            font-family:Georgia,'Times New Roman',serif;
            font-size:1.5rem; font-weight:700; margin-bottom:4px;
            text-shadow:0 2px 8px rgba(0,0,0,.5);
        }
        .error-msg { color:#e94560; font-size:.82rem; text-align:center; min-height:18px; }

        /* ====== LANDING ====== */
        .game-title {
            font-family:Georgia,'Times New Roman',serif;
            font-size:7rem; font-weight:900; color:var(--gold);
            letter-spacing:-2px; line-height:1;
            text-shadow:0 4px 0 #6a4200, 0 0 50px rgba(201,168,76,.35), 0 10px 28px rgba(0,0,0,.7);
            margin-bottom:8px;
        }
        .game-subtitle {
            font-size:.78rem; color:rgba(201,168,76,.35);
            text-transform:uppercase; letter-spacing:.22em; margin-bottom:52px;
        }
        .menu-btns { display:flex; flex-direction:column; gap:14px; width:270px; }

        /* ====== LOBBY ====== */
        #screen-lobby { justify-content:flex-start; padding-top:36px; gap:0; }

        .lobby-header { text-align:center; margin-bottom:20px; }
        .lobby-header h2 {
            font-size:.7rem; color:rgba(201,168,76,.45);
            text-transform:uppercase; letter-spacing:.2em; margin-bottom:12px;
        }
        .code-badge {
            display:inline-block;
            background:rgba(8,4,1,.75);
            border:2px solid var(--gold);
            border-radius:7px; padding:10px 26px;
            font-family:'Courier New',monospace;
            font-size:2.5rem; font-weight:900;
            letter-spacing:10px; color:var(--gold);
            text-shadow:0 0 22px rgba(201,168,76,.4);
            box-shadow:0 0 28px rgba(201,168,76,.08), inset 0 2px 8px rgba(0,0,0,.5);
        }
        .code-hint { font-size:.72rem; color:rgba(201,168,76,.3); margin-top:8px; }

        .player-list { width:370px; max-height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
        .player-row {
            background:rgba(8,4,1,.55); border:1px solid rgba(201,168,76,.12);
            border-radius:6px; padding:10px 15px;
            display:flex; align-items:center; justify-content:space-between;
            animation:fadeIn .2s ease;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
        .player-row-name { font-size:.93rem; font-weight:600; color:var(--ivory-d); }
        .badge { font-size:.67rem; padding:3px 9px; border-radius:4px; font-weight:700; letter-spacing:.05em; }
        .badge-host { background:rgba(139,26,46,.3); color:#e94560; border:1px solid rgba(139,26,46,.5); }
        .badge-you  { background:rgba(58,158,90,.2); color:#53d769; border:1px solid rgba(58,158,90,.4); }
        .badge-tags { display:flex; gap:5px; }

        .lobby-settings-row { display:flex; align-items:center; gap:10px; font-size:.86rem; color:rgba(201,168,76,.5); width:100%; }
        .lobby-settings-row label { color:rgba(201,168,76,.6); min-width:90px; }
        .lobby-settings-row select {
            background:rgba(8,4,1,.45); border:1px solid rgba(201,168,76,.22);
            color:var(--ivory); padding:6px 10px; border-radius:4px; font-size:.86rem; outline:none;
        }
        .lobby-actions { width:370px; display:flex; flex-direction:column; align-items:center; gap:10px; }
        #lobby-settings-display { font-size:.78rem; color:rgba(201,168,76,.4); text-align:center; }
        #lobby-status { font-size:.81rem; color:rgba(201,168,76,.38); text-align:center; }

        /* ── Category tokens ── */
        .cat-label { font-size:.7rem; color:rgba(201,168,76,.5); }
        .cat-picker { display:flex; flex-wrap:wrap; gap:7px; width:100%; }
        .cat-token {
            padding:5px 11px; border-radius:4px; font-size:.78rem; cursor:pointer;
            border:1px solid rgba(201,168,76,.18);
            background:rgba(8,4,1,.4); color:rgba(201,168,76,.45);
            transition:all .15s; user-select:none;
        }
        .cat-token:hover { border-color:rgba(201,168,76,.5); color:var(--gold); }
        .cat-token.selected {
            background:rgba(201,168,76,.18); border-color:var(--gold);
            color:var(--gold); box-shadow:0 0 8px rgba(201,168,76,.18);
        }

        /* ====== GAME SCREEN ====== */
        #game-table {
            position:relative; width:100vw; height:calc(100vh - 185px);
            background:radial-gradient(ellipse at center, #1f5235 0%, #0d2d1a 100%);
        }
        #game-hud {
            position:absolute; top:12px; left:50%; transform:translateX(-50%);
            background:rgba(8,4,1,.72); border:1px solid rgba(201,168,76,.25);
            border-radius:5px; padding:5px 20px;
            font-size:.79rem; color:rgba(201,168,76,.45); z-index:20; white-space:nowrap;
        }
        #game-hud .hl { color:var(--gold); font-weight:700; }

        /* Deck — lives in the self-zone, right of the hand */
        #deck-zone {
            display:flex; flex-direction:column; align-items:center;
            justify-content:flex-end; gap:5px;
            flex-shrink:0; padding-bottom:2px;
        }
        #deck-icon {
            width:72px; height:100px;
            background:
                repeating-linear-gradient( 45deg, transparent, transparent 7px, rgba(255,255,255,0.03) 7px, rgba(255,255,255,0.03) 8px),
                repeating-linear-gradient(-45deg, transparent, transparent 7px, rgba(255,255,255,0.03) 7px, rgba(255,255,255,0.03) 8px),
                linear-gradient(150deg, #5a0d1c, #38080f);
            border:2px solid rgba(201,168,76,.55);
            border-radius:8px;
            display:flex; align-items:center; justify-content:center; font-size:1.5rem;
            box-shadow:0 0 0 1px rgba(201,168,76,.12), 0 8px 22px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.05);
            cursor:pointer; transition:transform .15s, box-shadow .15s, opacity .2s;
        }
        #deck-icon.can-draw:hover {
            transform:translateY(-6px) scale(1.06);
            box-shadow:0 0 0 1px rgba(201,168,76,.5), 0 0 32px rgba(201,168,76,.22), 0 14px 30px rgba(0,0,0,.7);
        }
        #deck-icon.no-draw { border-color:rgba(201,168,76,.12); opacity:.45; cursor:not-allowed; box-shadow:none; }
        #deck-icon.empty   { border-color:rgba(80,80,80,.2); opacity:.18; cursor:not-allowed; box-shadow:none; }
        #deck-count { font-size:.68rem; color:rgba(201,168,76,.45); }
        #deck-hint  { font-size:.62rem; color:var(--gold); opacity:.8; min-height:13px; text-align:center; }

        /* Opponents */
        .opp-zone { position:absolute; display:flex; flex-direction:column; align-items:center; gap:5px; transform:translate(-50%,-50%); z-index:4; }
        .opp-label {
            font-size:.69rem; color:rgba(201,168,76,.65);
            background:rgba(8,4,1,.62); padding:2px 9px;
            border-radius:4px; border:1px solid rgba(201,168,76,.18);
        }
        .opp-card {
            width:78px; height:110px;
            background:linear-gradient(160deg, var(--ivory), #ede7d4);
            border:1.5px solid #c4bba0; border-radius:8px;
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; text-align:center; padding:6px;
            box-shadow:0 7px 22px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.9);
            transition:transform .15s, border-color .15s, box-shadow .15s;
            position:relative;
        }
        .opp-card::before, .opp-card::after {
            content:attr(data-sym);
            position:absolute; font-size:.68rem; color:var(--ink); opacity:.35; line-height:1;
        }
        .opp-card::before { top:4px; left:5px; }
        .opp-card::after  { bottom:4px; right:5px; transform:rotate(180deg); }
        .opp-card.capturable {
            border-color:var(--red); cursor:pointer;
            box-shadow:0 0 18px rgba(192,33,62,.5), 0 7px 22px rgba(0,0,0,.6);
        }
        .opp-card.capturable:hover {
            transform:scale(1.1) translateY(-6px) rotate(-1deg);
            box-shadow:0 0 32px rgba(192,33,62,.8), 0 14px 30px rgba(0,0,0,.65);
        }
        .opp-card.empty-card { opacity:.16; cursor:default; }
        .opp-card .sym { font-size:1.75rem; line-height:1; }
        .opp-card .cat { font-size:.55rem; color:var(--ink); margin-top:5px; line-height:1.35; font-weight:700; opacity:.7; }
        .opp-sub { font-size:.64rem; color:rgba(201,168,76,.4); text-align:center; }
        .opp-sub .pts { color:#53d769; }

        /* Self zone */
        #self-zone {
            position:fixed; bottom:0; left:0; right:0; height:185px;
            background:linear-gradient(to top, #0d0804 55%, rgba(13,8,4,0));
            border-top:3px solid rgba(201,168,76,.28);
            box-shadow:0 -4px 24px rgba(0,0,0,.5);
            padding:8px 24px 14px; z-index:20;
            display:flex; flex-direction:column; align-items:stretch;
        }
        #self-header { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
        #self-name  { font-size:.88rem; font-weight:700; color:var(--gold); }
        #self-pts   { font-size:.8rem; color:#53d769; }
        #self-hint  { font-size:.72rem; color:rgba(201,168,76,.32); }
        #self-bottom { display:flex; flex-direction:row; align-items:flex-end; gap:20px; flex:1; }
        #self-hand  { position:relative; flex:1; height:116px; }
        #self-empty { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:rgba(201,168,76,.18); font-size:.85rem; }

        .self-card {
            position:absolute; bottom:0; width:70px; height:100px;
            border-radius:8px; border:1.5px solid #c4bba0;
            background:linear-gradient(160deg, var(--ivory), #ede7d4);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            text-align:center; padding:4px; transform-origin:bottom center;
            box-shadow:0 7px 20px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.9);
        }
        .self-card.top-card {
            border-color:var(--red);
            box-shadow:0 0 20px rgba(192,33,62,.4), 0 8px 22px rgba(0,0,0,.55);
        }
        .self-card .sym { font-size:1.5rem; line-height:1; }
        .self-card .cat { font-size:.55rem; color:var(--ink); margin-top:4px; line-height:1.3; font-weight:700; opacity:.7; }

        .pile-badge {
            position:absolute; bottom:10px; left:calc(50% + 40px);
            font-size:.62rem; color:rgba(201,168,76,.38); white-space:nowrap;
        }
    </style>
</head>
<body>

<!-- ==================== LANDING ==================== -->
<div id="screen-landing" class="screen active">
    <div class="game-title">TILT</div>
    <div class="game-subtitle">Gioco di carte multiplayer</div>
    <div class="menu-btns">
        <button class="btn btn-primary"   onclick="showScreen('create')">Crea partita</button>
        <button class="btn btn-secondary" onclick="showScreen('join')">Entra in partita</button>
    </div>
</div>

<!-- ==================== CREA LOBBY ==================== -->
<div id="screen-create" class="screen">
    <div class="form-box">
        <h2>Crea Partita</h2>
        <input id="create-name" class="input-field" type="text" placeholder="Il tuo nome" maxlength="18" />
        <div class="lobby-settings-row">
            <label for="create-cards">Carte a testa</label>
            <select id="create-cards">
                <option value="4">4</option>
                <option value="5" selected>5</option>
                <option value="6">6</option>
                <option value="7">7</option>
            </select>
        </div>
        <div class="cat-label">Categorie (scegline una o più)</div>
        <div class="cat-picker" id="create-category-list"></div>
        <button class="btn btn-primary" onclick="createLobby()">Crea e ottieni codice</button>
        <div id="create-error" class="error-msg"></div>
        <button class="btn btn-ghost" onclick="showScreen('landing')">← Indietro</button>
    </div>
</div>

<!-- ==================== ENTRA LOBBY ==================== -->
<div id="screen-join" class="screen">
    <div class="form-box">
        <h2>Entra in Partita</h2>
        <input id="join-name" class="input-field" type="text" placeholder="Il tuo nome" maxlength="18" />
        <input id="join-code" class="input-field" type="text" placeholder="CODICE"
               maxlength="6"
               style="text-transform:uppercase;letter-spacing:5px;text-align:center;font-size:1.4rem;font-weight:700;" />
        <button class="btn btn-primary" onclick="joinLobby()">Entra</button>
        <div id="join-error" class="error-msg"></div>
        <button class="btn btn-ghost" onclick="showScreen('landing')">← Indietro</button>
    </div>
</div>

<!-- ==================== SALA D'ATTESA ==================== -->
<div id="screen-lobby" class="screen">
    <div class="lobby-header">
        <h2>Codice Partita</h2>
        <div class="code-badge" id="lobby-code-display">——————</div>
        <div class="code-hint">Condividi questo codice con gli altri giocatori</div>
    </div>

    <div class="player-list" id="lobby-player-list"></div>

    <div class="lobby-actions">
        <div id="lobby-settings-display"></div>
        <button id="start-btn" class="btn btn-primary" style="width:100%;display:none;" onclick="startGame()">
            Inizia la partita
        </button>
        <div id="lobby-status">In attesa di giocatori…</div>
        <button class="btn btn-ghost btn-danger" onclick="leaveLobby()">Abbandona</button>
    </div>
</div>

<!-- ==================== PARTITA ==================== -->
<div id="screen-game" class="screen">
    <div id="game-table">
        <div id="game-hud">
            Turno <span class="hl" id="hud-turn">1</span>
            &nbsp;·&nbsp;
            <span class="hl" id="hud-whose-turn">—</span>
        </div>
    </div>
    <div id="self-zone">
        <div id="self-header">
            <div id="self-name">Tu</div>
            <div id="self-pts">0 pt</div>
            <div id="self-hint"></div>
        </div>
        <div id="self-bottom">
            <div id="self-hand">
                <div id="self-empty">Nessuna carta ancora</div>
            </div>
            <div id="deck-zone">
                <div id="deck-icon">♦</div>
                <div id="deck-count">— carte</div>
                <div id="deck-hint"></div>
            </div>
        </div>
    </div>
</div>

<script src="Tilt.V1.js"></script>
<script src="categories.js"></script>
<script>
// ================================================================
//  IDENTITY
// ================================================================
const myId = (Date.now().toString(36) + Math.random().toString(36).slice(2)).toUpperCase();
let myName = '';

// ================================================================
//  SCREEN ROUTER
// ================================================================
function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
}

// ================================================================
//  XSS-SAFE HELPERS
// ================================================================
function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ================================================================
//  NETWORKING  (BroadcastChannel)
// ================================================================
const MSG = {
    PING:'PING', JOIN_REQUEST:'JOIN_REQUEST', LOBBY_STATE:'LOBBY_STATE',
    GAME_START:'GAME_START', GAME_STATE:'GAME_STATE',
    ACTION_DRAW:'ACTION_DRAW', ACTION_CAPTURE:'ACTION_CAPTURE',
};

let myChannel = null;
let isHost    = false;

function openChannel(code) {
    if (myChannel) myChannel.close();
    myChannel = new BroadcastChannel('tilt-' + code.toUpperCase());
    myChannel.onmessage = ({ data }) => onMessage(data);
}
function send(type, payload) {
    if (myChannel) myChannel.postMessage({ type, payload, from: myId });
}
function onMessage({ type, payload, from }) {
    switch (type) {
        case MSG.PING:           if (isHost)  hostBroadcastLobby();           break;
        case MSG.JOIN_REQUEST:   if (isHost)  hostHandleJoin(payload, from);  break;
        case MSG.LOBBY_STATE:    if (!isHost) receiveLobbyState(payload);     break;
        case MSG.GAME_START:     if (!isHost) receiveGameStart(payload);      break;
        case MSG.GAME_STATE:     if (!isHost) receiveGameState(payload);      break;
        case MSG.ACTION_DRAW:    if (isHost)  hostProcessDraw(from);          break;
        case MSG.ACTION_CAPTURE: if (isHost)  hostProcessCapture(from, payload.fromId); break;
    }
}

// ================================================================
//  LOBBY STATE
// ================================================================
let lobby = { code:'', players:[], cardsPerPlayer:5, categorySetKeys:['geography'], status:'waiting' };

function generateCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

// ──── CREATE ────
function createLobby() {
    const name = document.getElementById('create-name').value.trim();
    if (!name) { document.getElementById('create-error').textContent = 'Inserisci il tuo nome.'; return; }

    const selectedKeys = Array.from(document.querySelectorAll('.cat-token.selected')).map(t => t.dataset.key);
    if (selectedKeys.length === 0) { document.getElementById('create-error').textContent = 'Scegli almeno una categoria.'; return; }
    document.getElementById('create-error').textContent = '';

    myName = name; isHost = true;
    const code = generateCode();
    lobby = {
        code,
        players: [{ id:myId, name:myName, isHost:true }],
        cardsPerPlayer: parseInt(document.getElementById('create-cards').value),
        categorySetKeys: selectedKeys,
        status: 'waiting'
    };
    openChannel(code);
    enterLobbyScreen();
}

// ──── JOIN ────
let joinTimeout = null;

function joinLobby() {
    const name = document.getElementById('join-name').value.trim();
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    const err  = document.getElementById('join-error');
    if (!name) { err.textContent = 'Inserisci il tuo nome.'; return; }
    if (code.length !== 6) { err.textContent = 'Il codice deve avere 6 caratteri.'; return; }
    err.textContent = '';

    myName = name; isHost = false; lobby.code = code;
    openChannel(code);
    send(MSG.PING);
    send(MSG.JOIN_REQUEST, { id:myId, name:myName });

    joinTimeout = setTimeout(() => {
        if (!document.getElementById('screen-lobby').classList.contains('active')) {
            document.getElementById('join-error').textContent = 'Lobby non trovata — controlla il codice.';
            myChannel.close();
        }
    }, 5000);
}

function hostHandleJoin(payload) {
    if (lobby.players.find(p => p.id === payload.id)) { hostBroadcastLobby(); return; }
    lobby.players.push({ id:payload.id, name:payload.name, isHost:false });
    hostBroadcastLobby(); renderLobby();
}
function hostBroadcastLobby() { send(MSG.LOBBY_STATE, lobby); }

function receiveLobbyState(state) {
    lobby = state;
    if (joinTimeout) { clearTimeout(joinTimeout); joinTimeout = null; }
    if (!document.getElementById('screen-lobby').classList.contains('active')) enterLobbyScreen();
    renderLobby();
}

function enterLobbyScreen() {
    document.getElementById('lobby-code-display').textContent = lobby.code;
    showScreen('lobby'); renderLobby();
}

function renderLobby() {
    const list = document.getElementById('lobby-player-list');
    list.innerHTML = '';
    lobby.players.forEach(p => {
        const div = document.createElement('div');
        div.className = 'player-row';
        const tags = [
            p.isHost      ? '<span class="badge badge-host">HOST</span>' : '',
            p.id === myId ? '<span class="badge badge-you">TU</span>'    : '',
        ].filter(Boolean).join('');
        div.innerHTML = `<div class="player-row-name">${esc(p.name)}</div><div class="badge-tags">${tags}</div>`;
        list.appendChild(div);
    });

    // Settings summary
    const catLabels = (lobby.categorySetKeys || [])
        .map(k => CATEGORY_SETS[k] ? CATEGORY_SETS[k].label : k).join(' + ');
    document.getElementById('lobby-settings-display').textContent =
        `${lobby.cardsPerPlayer} carte/giocatore · ${catLabels} · ${lobby.players.length} giocator${lobby.players.length !== 1 ? 'i' : 'e'}`;

    const startBtn = document.getElementById('start-btn');
    const statusEl = document.getElementById('lobby-status');
    if (isHost) {
        startBtn.style.display = lobby.players.length >= 2 ? 'block' : 'none';
        statusEl.textContent   = lobby.players.length < 2
            ? 'In attesa di almeno un altro giocatore…'
            : lobby.players.length + ' giocatori pronti — puoi iniziare!';
    } else {
        startBtn.style.display = 'none';
        statusEl.textContent   = "In attesa che l'host avvii la partita…";
    }
}

function leaveLobby() {
    if (myChannel) { myChannel.close(); myChannel = null; }
    isHost = false;
    lobby  = { code:'', players:[], cardsPerPlayer:5, categorySetKeys:['geography'], status:'waiting' };
    showScreen('landing');
}

// ================================================================
//  GAME STATE
// ================================================================
const EMOJI = { apple:'🍎', umbrella:'☂️', airplane:'✈️', flower:'🌸', star:'⭐' };
let gs   = null;
let myGs = null;

function startGame() {
    if (!isHost) return;
    // Merge categories from all selected sets
    const allCats = (lobby.categorySetKeys || []).flatMap(k => CATEGORY_SETS[k] ? CATEGORY_SETS[k].categories : []);
    const cats = allCats.length > 0 ? allCats : Object.values(CATEGORY_SETS)[0].categories;
    const deck = generateDeck(lobby.players.length, lobby.cardsPerPlayer, cats);
    gs = {
        deck,
        players: lobby.players.map(p => ({ id:p.id, name:p.name, isHost:p.isHost, stack:[], points:0 })),
        cpIdx: 0, turn: 1, status: 'playing'
    };
    const snap = snapshot();
    send(MSG.GAME_START, snap);
    myGs = snap; enterGame();
}

function snapshot() { return JSON.parse(JSON.stringify(gs)); }
function receiveGameStart(state) { myGs = state; enterGame(); }
function receiveGameState(state) { myGs = state; renderGame(); }
function hostBroadcastGame()     { send(MSG.GAME_STATE, snapshot()); }

// ================================================================
//  GAME ACTIONS
// ================================================================
function onClickDeck() {
    if (isHost) hostProcessDraw(myId);
    else        send(MSG.ACTION_DRAW, {});
}
function onClickCapture(fromPlayerId) {
    if (isHost) hostProcessCapture(myId, fromPlayerId);
    else        send(MSG.ACTION_CAPTURE, { fromId: fromPlayerId });
}

function hostProcessDraw(actorId) {
    const cp = gs.players[gs.cpIdx];
    if (cp.id !== actorId) return;
    if (gs.deck.length === 0) return;
    cp.stack.push(gs.deck.pop());
    gs.cpIdx = (gs.cpIdx + 1) % gs.players.length;
    gs.turn++;
    hostBroadcastGame(); myGs = snapshot(); renderGame();
}

function hostProcessCapture(captorId, fromId) {
    if (captorId === fromId) return;
    const captor = gs.players.find(p => p.id === captorId);
    const from   = gs.players.find(p => p.id === fromId);
    if (!captor || !from || from.stack.length === 0) return;
    from.stack.pop();
    captor.points++;
    hostBroadcastGame(); myGs = snapshot(); renderGame();
}

// ================================================================
//  GAME RENDERING
// ================================================================
function enterGame() { showScreen('game'); renderGame(); }

function activeCard(player) {
    return player.stack.length ? player.stack[player.stack.length - 1] : null;
}

function opponentPositions(count) {
    if (count === 0) return [];
    const tableH = window.innerHeight - 185;
    const cx = 50, cy = (tableH / 2 / window.innerHeight) * 100;
    const rx = 30, ry = 18, arc = count === 1 ? 0 : 130;
    return Array.from({length:count}, (_, i) => {
        const deg = count === 1 ? 270 : (270 - arc/2) + i*(arc/(count-1));
        const rad = deg * Math.PI / 180;
        return { x: cx + rx*Math.cos(rad), y: cy + ry*Math.sin(rad) };
    });
}

function renderGame() {
    const state = myGs || gs;
    if (!state) return;
    const myIdx = state.players.findIndex(p => p.id === myId);
    if (myIdx === -1) return;

    const me        = state.players[myIdx];
    const curPlayer = state.players[state.cpIdx];
    const isMyTurn  = curPlayer.id === myId;
    const canDraw   = isMyTurn && state.deck.length > 0;

    // HUD
    document.getElementById('hud-turn').textContent       = state.turn;
    document.getElementById('hud-whose-turn').textContent =
        isMyTurn ? 'Turno tuo' : 'Turno di ' + esc(curPlayer.name);

    // Deck
    const rem = state.deck.length;
    document.getElementById('deck-count').textContent = rem + ' cart' + (rem !== 1 ? 'e' : 'a');
    const deckEl = document.getElementById('deck-icon');
    if (rem === 0) {
        deckEl.className = 'empty';
        document.getElementById('deck-hint').textContent = 'Mazzo esaurito';
    } else if (canDraw) {
        deckEl.className = 'can-draw';
        document.getElementById('deck-hint').textContent = 'Pesca una carta';
    } else {
        deckEl.className = 'no-draw';
        document.getElementById('deck-hint').textContent = 'Turno di ' + esc(curPlayer.name);
    }

    // Self
    document.getElementById('self-name').textContent = esc(me.name) + ' (Tu)';
    document.getElementById('self-pts').textContent  = me.points + ' pt';
    document.getElementById('self-hint').textContent = isMyTurn
        ? (canDraw ? 'Pesca · o ruba una carta avversaria' : 'Ruba una carta avversaria')
        : 'Ruba una carta · ' + esc(curPlayer.name) + ' sta pescando';
    renderSelfHand(me);

    // Opponents
    document.querySelectorAll('.opp-zone').forEach(el => el.remove());
    const n    = state.players.length;
    const opps = Array.from({length: n-1}, (_, k) => state.players[(myIdx+k+1) % n]);
    const positions = opponentPositions(opps.length);

    opps.forEach((opp, i) => {
        const pos  = positions[i];
        const card = activeCard(opp);
        const capturable = card !== null;

        const cardClass  = 'opp-card' + (capturable ? ' capturable' : '') + (!card ? ' empty-card' : '');
        const symEmoji   = card ? (EMOJI[card.symbol] || card.symbol) : '—';
        const inner      = card
            ? `<div class="sym">${symEmoji}</div><div class="cat">${esc(card.category)}</div>`
            : `<div class="sym" style="color:#aaa;opacity:.3">—</div>`;
        const handler    = capturable ? `onclick="onClickCapture('${opp.id}')"` : '';

        const zone = document.createElement('div');
        zone.className  = 'opp-zone';
        zone.style.left = `${pos.x}vw`;
        zone.style.top  = `${pos.y}vh`;
        zone.innerHTML  = `
            <div class="opp-label">${esc(opp.name)}</div>
            <div class="${cardClass}" data-sym="${esc(symEmoji)}" ${handler}>${inner}</div>
            <div class="opp-sub">${opp.stack.length} in pila &nbsp;·&nbsp; <span class="pts">${opp.points} pt</span></div>`;
        document.getElementById('game-table').appendChild(zone);
    });
}

function renderSelfHand(player) {
    const hand  = document.getElementById('self-hand');
    hand.innerHTML = '';
    const stack = player.stack;
    if (!stack.length) {
        hand.innerHTML = '<div id="self-empty">Nessuna carta ancora</div>';
        return;
    }
    const active    = stack[stack.length - 1];
    const pileCount = stack.length - 1;

    const div = document.createElement('div');
    div.className   = 'self-card top-card';
    div.style.left  = '50%';
    div.style.transform = 'translateX(-50%)';
    div.innerHTML   = `<div class="sym">${EMOJI[active.symbol] || active.symbol}</div><div class="cat">${esc(active.category)}</div>`;
    hand.appendChild(div);

    if (pileCount > 0) {
        const badge = document.createElement('div');
        badge.className   = 'pile-badge';
        badge.textContent = '+' + pileCount + ' sotto';
        hand.appendChild(badge);
    }
}

// ================================================================
//  EVENT LISTENERS + INIT
// ================================================================
document.getElementById('deck-icon').addEventListener('click', onClickDeck);

document.getElementById('join-code').addEventListener('input', function () {
    this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
});

// Build category token picker
(function () {
    const picker = document.getElementById('create-category-list');
    Object.entries(CATEGORY_SETS).forEach(([key, set], idx) => {
        const tok = document.createElement('div');
        tok.className   = 'cat-token' + (idx === 0 ? ' selected' : '');
        tok.dataset.key = key;
        tok.textContent = set.label;
        tok.addEventListener('click', () => tok.classList.toggle('selected'));
        picker.appendChild(tok);
    });
})();
</script>
</body>
